<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-warning text-center">
                        <h1>Heat Index Checker</h1>
                    </div>
                    <div class="card-body">

                        <div class=" text-center mb-4">
                            <p>Note:</p>Enter temperature in °C and humidity in % then click check.
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Temperature (°C)</label>
                            <input type="number" id="temp" class="form-control" placeholder="Example: 32">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Humidity (%)</label>
                            <input type="number" id="humidity" class="form-control" placeholder="Example: 65">
                        </div>

                        <button onclick="checkHeatIndex()" class="btn btn-warning w-100">CHECK</button>

                        <div id="result" class="mt-4 text-center fw-bold"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
